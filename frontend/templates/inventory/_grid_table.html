{% for name, data in inventory.items() %}
{% include 'inventory/_grid_row.html' %}
{% endfor %}

{% if not inventory %}
<tr>
    <td colspan="{{ pokeball_types | length + 3 }}" class="text-center py-16">
        <div class="flex flex-col items-center gap-3">
            <!-- Empty state Pokeball -->
            <div class="relative w-12 h-12 opacity-20">
                <div class="absolute inset-0 rounded-full border-2 border-dex-muted overflow-hidden">
                    <div class="absolute top-0 left-0 right-0 h-1/2 bg-dex-muted/30"></div>
                </div>
                <div class="absolute top-1/2 left-0 right-0 h-[2px] bg-dex-muted -translate-y-1/2"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 rounded-full border-2 border-dex-muted bg-dex-dark"></div>
            </div>
            <p class="text-dex-muted text-sm font-display">No Pokemon in your vault</p>
            <p class="text-dex-muted/50 text-xs font-mono">Upload a CSV file to get started</p>
        </div>
    </td>
</tr>
{% endif %}
